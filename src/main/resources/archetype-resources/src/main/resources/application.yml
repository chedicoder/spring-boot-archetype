#set( $symbol_pound = '#' )
#set( $symbol_dollar = '$' )
#set( $symbol_escape = '\' )

spring:
  application:
    name: ${artifactId}

  profiles:
    active: local

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

  jackson:
    serialization:
      indent-output: true

server:
  port: 8080

logging:
  level:
    root: INFO
    ${groupId}: DEBUG
